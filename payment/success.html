<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFF Lab | Makse õnnestus</title>
    <link class="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        @keyframes checkPop {
            0%   { transform: scale(0.4); opacity: 0; }
            70%  { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .check-anim { animation: checkPop 0.5s cubic-bezier(0.16,1,0.3,1) both; }
    </style>
</head>
<body class="antialiased text-zinc-100">

    <div class="min-h-screen flex items-center justify-center px-6 py-32">
        <div class="w-full max-w-md text-center">

            <div class="check-anim inline-flex items-center justify-center w-20 h-20 rounded-full mb-8"
                 style="background:rgba(22,163,74,0.12);border:1px solid rgba(22,163,74,0.3)">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>

            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-green-500 mb-3" id="order-label">SFF Lab</p>
            <h1 data-key="success-title" class="text-3xl font-black uppercase tracking-tight mb-4">Makse õnnestus</h1>
            <p data-key="success-body" class="text-zinc-400 text-sm leading-relaxed mb-8">
                Teie makse on laekunud.<br>Alustame teie arvuti ehitamisega.
            </p>

            <div id="order-box" style="display:none"
                 class="inline-block mb-8 px-6 py-4 rounded-2xl text-center"
                 style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08)">
                <p class="text-[9px] font-black uppercase tracking-[0.25em] text-zinc-500 mb-1" data-key="order-num-label">Tellimuse number</p>
                <p id="order-number" class="text-lg font-black tracking-widest text-white"></p>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="/" data-key="back-home"
                   class="inline-block px-8 py-3 rounded-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black uppercase tracking-widest transition">
                    Tagasi pealehele
                </a>
                <a href="mailto:info@sfflab.ee"
                   class="inline-block px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition"
                   style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#71717a"
                   onmouseover="this.style.color='white';this.style.borderColor='rgba(255,255,255,0.3)'"
                   onmouseout="this.style.color='#71717a';this.style.borderColor='rgba(255,255,255,0.1)'">
                    info@sfflab.ee
                </a>
            </div>

        </div>
    </div>

    <script src="../nav.js"></script>
    <script>
        window.pageTranslations = {
            et: {
                'success-title':    'Makse õnnestus',
                'success-body':     'Teie makse on laekunud.\nAlustame teie arvuti ehitamisega.',
                'order-num-label':  'Tellimuse number',
                'back-home':        'Tagasi pealehele'
            },
            ru: {
                'success-title':    'Оплата прошла',
                'success-body':     'Ваш платёж получен.\nМы начнём сборку вашего компьютера.',
                'order-num-label':  'Номер заказа',
                'back-home':        'На главную'
            },
            en: {
                'success-title':    'Payment received',
                'success-body':     'Your payment was received.\nWe will start building your PC.',
                'order-num-label':  'Order number',
                'back-home':        'Back to home'
            }
        };

        (function () {
            var params  = new URLSearchParams(window.location.search);
            var orderId = params.get('order');
            if (orderId) {
                var box = document.getElementById('order-box');
                var num = document.getElementById('order-number');
                var lbl = document.getElementById('order-label');
                box.style.display = 'inline-block';
                num.textContent   = orderId;
                lbl.textContent   = orderId;
            }
        })();
    </script>
</body>
</html>

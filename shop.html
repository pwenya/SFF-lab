<!DOCTYPE html>
<html lang="et" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFF Lab — Shop</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }

        .glass-card {
            background: rgba(255,255,255,0.02); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08); height: 100%;
            transition: border-color 0.5s cubic-bezier(0.4,0,0.2,1), transform 0.5s cubic-bezier(0.4,0,0.2,1),
                        box-shadow 0.5s cubic-bezier(0.4,0,0.2,1), background 0.5s cubic-bezier(0.4,0,0.2,1);
        }
        .glass-card:hover {
            border-color: rgba(59,130,246,0.45); transform: translateY(-8px) scale(1.02);
            box-shadow: 0 24px 48px rgba(59,130,246,0.14); background: rgba(255,255,255,0.04);
        }

        .text-gradient { background: linear-gradient(to right, #fff 30%, #64748b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(36px); } to { opacity: 1; transform: translateY(0); } }
        .anim-hero-title { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
        .anim-hero-cta   { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.45s both; }

        .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        .os-switch-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #52525b; cursor: pointer; }
        .os-switch-btn.active { background: white; color: black; border-color: white; }

        .shop-grid { transition: opacity 0.35s ease, transform 0.35s ease; }
        .shop-grid-hidden { opacity: 0; transform: translateY(12px); pointer-events: none; position: absolute; width: 100%; }
        .shop-grid-visible { opacity: 1; transform: translateY(0); }

        .product-img-wrap {
            height: 200px; background: rgba(255,255,255,0.02); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden;
        }
        .product-img-wrap img { height: 200px; width: 100%; object-fit: contain; }

        .shop-modal-overlay {
            position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); padding: 16px;
        }
        .shop-modal-box {
            width: 100%; max-width: 460px; background: #111; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px; overflow: hidden; position: relative;
        }
        .shop-input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 13px; font-family: inherit;
            outline: none; transition: border-color 0.2s; box-sizing: border-box;
        }
        .shop-input:focus { border-color: rgba(59,130,246,0.6); }
        .shop-input::placeholder { color: #52525b; }
        .cart-btn { position:fixed;bottom:24px;right:24px;z-index:998;background:#2563eb;border:none;border-radius:100px;padding:14px 20px;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:white;box-shadow:0 8px 32px rgba(37,99,235,0.4);transition:all 0.2s;opacity:0;pointer-events:none; }
        .cart-btn.visible { opacity:1;pointer-events:all; }
        .cart-btn:hover { background:#1d4ed8;transform:scale(1.05); }
        .cart-count { background:white;color:#2563eb;border-radius:100px;font-size:10px;font-weight:900;padding:2px 7px; }
        .cart-overlay { position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.3s; }
        .cart-overlay.open { opacity:1;pointer-events:all; }
        .cart-box { background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);border-radius:32px;padding:32px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;transform:translateY(20px) scale(0.97);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.35s ease;opacity:0; }
        .cart-overlay.open .cart-box { transform:translateY(0) scale(1);opacity:1; }
        .cart-item { display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05); }
    </style>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="antialiased text-zinc-100">

    <div class="pt-[73px] md:pt-[88px]">

        <!-- Hero -->
        <section class="py-16 px-6 text-center relative overflow-hidden">
            <div class="absolute inset-0 pointer-events-none">
                <div class="absolute top-1/2 left-1/2 w-[600px] h-[400px] bg-blue-600/8 blur-[120px] rounded-full" style="transform:translate(-50%,-50%)"></div>
            </div>
            <div class="relative z-10 max-w-4xl mx-auto anim-hero-title">
                <h1 class="text-[3rem] sm:text-[5rem] md:text-[7rem] font-extrabold tracking-tighter leading-tight uppercase text-gradient">Shop</h1>
            </div>
        </section>

        <!-- Main tabs + grids -->
        <section class="pb-24 px-6 relative z-10">
            <div class="max-w-6xl mx-auto">

                <!-- Category tabs -->
                <div class="anim-hero-cta flex justify-center gap-4 mb-8">
                    <button onclick="switchCategory('gpu')" id="tab-gpu" class="os-switch-btn active px-10 py-3 rounded-full text-[11px] font-black uppercase tracking-widest" data-key="shop-gpu">Videokaardid</button>
                    <button onclick="switchCategory('cpu')" id="tab-cpu" class="os-switch-btn px-10 py-3 rounded-full text-[11px] font-black uppercase tracking-widest" data-key="shop-cpu">Protsessorid</button>
                </div>

                <!-- Brand sub-tabs: GPU (visible by default) -->
                <div id="brands-gpu" class="flex justify-center gap-3 mb-10">
                    <button onclick="switchBrand('gpu','nvidia')" id="brand-gpu-nvidia" class="os-switch-btn px-8 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest">NVIDIA</button>
                    <button onclick="switchBrand('gpu','amd')"    id="brand-gpu-amd"    class="os-switch-btn px-8 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest">AMD</button>
                </div>

                <!-- Brand sub-tabs: CPU (hidden via style, not Tailwind class) -->
                <div id="brands-cpu" style="display:none" class="flex justify-center gap-3 mb-10">
                    <button onclick="switchBrand('cpu','intel')" id="brand-cpu-intel" class="os-switch-btn px-8 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest">Intel</button>
                    <button onclick="switchBrand('cpu','amd')"   id="brand-cpu-amd"   class="os-switch-btn px-8 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest">AMD</button>
                </div>

                <!-- Grids -->
                <div class="relative">

                    <!-- GPU · NVIDIA -->
                    <div id="grid-gpu-nvidia" class="shop-grid shop-grid-visible">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 items-stretch">

                            <div class="flex reveal">
                                <div class="glass-card p-8 rounded-[40px] flex flex-col w-full">
                                    <div class="product-img-wrap">
                                        <img src="" alt="PNY GeForce RTX 5080 16GB OC Triple Fan">
                                    </div>
                                    <span class="text-blue-500 text-[10px] font-black uppercase tracking-[0.2em] mb-2">NVIDIA · PNY</span>
                                    <h3 class="text-base font-extrabold text-white mb-4 leading-snug">GeForce RTX 5080 16GB OC Triple Fan</h3>
                                    <div class="space-y-1.5 text-[11px] font-bold uppercase tracking-[0.1em] mb-6">
                                        <div class="text-zinc-600">VRAM <span class="text-zinc-400">16GB GDDR7</span></div>
                                        <div class="text-zinc-600">TDP <span class="text-zinc-400">850W</span></div>
                                    </div>
                                    <div class="mt-auto">
                                        <div class="text-3xl font-black tracking-tighter text-white mb-5">2000 €</div>
                                        <button onclick="addToCart({title:'GeForce RTX 5080 16GB OC Triple Fan',brand:'NVIDIA · PNY',price:'2000 €',priceNum:2000,specs:[{l:'VRAM',v:'16GB GDDR7'},{l:'TDP',v:'850W'}]})" class="w-full py-3 rounded-2xl text-xs font-bold uppercase tracking-widest mb-2 transition-all" style="background:rgba(37,99,235,0.1);color:#60a5fa;border:1px solid rgba(37,99,235,0.3);cursor:pointer" data-key="cart-add">+ Ostukorvi</button>
                                        <button onclick="openShopModal({name:'GeForce RTX 5080 16GB OC Triple Fan',brand:'NVIDIA · PNY',specs:[{l:'VRAM',v:'16GB GDDR7'},{l:'TDP',v:'850W'}],price:2000,priceDisplay:'2000 €'})" class="w-full py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition" style="background:#2563eb;color:#fff" data-key="shop-order">Tellida</button>
                                    </div>
                                </div>
                            </div>

                            <div class="flex reveal">
                                <div class="glass-card p-8 rounded-[40px] flex flex-col w-full">
                                    <div class="product-img-wrap">
                                        <img src="" alt="PNY GeForce RTX 5080 16GB ARGB OC Triple Fan">
                                    </div>
                                    <span class="text-blue-500 text-[10px] font-black uppercase tracking-[0.2em] mb-2">NVIDIA · PNY</span>
                                    <h3 class="text-base font-extrabold text-white mb-4 leading-snug">GeForce RTX 5080 16GB ARGB OC Triple Fan</h3>
                                    <div class="space-y-1.5 text-[11px] font-bold uppercase tracking-[0.1em] mb-6">
                                        <div class="text-zinc-600">VRAM <span class="text-zinc-400">16GB GDDR7</span></div>
                                        <div class="text-zinc-600">TDP <span class="text-zinc-400">850W</span></div>
                                    </div>
                                    <div class="mt-auto">
                                        <div class="text-3xl font-black tracking-tighter text-white mb-5">2000 €</div>
                                        <button onclick="addToCart({title:'GeForce RTX 5080 16GB ARGB OC Triple Fan',brand:'NVIDIA · PNY',price:'2000 €',priceNum:2000,specs:[{l:'VRAM',v:'16GB GDDR7'},{l:'TDP',v:'850W'}]})" class="w-full py-3 rounded-2xl text-xs font-bold uppercase tracking-widest mb-2 transition-all" style="background:rgba(37,99,235,0.1);color:#60a5fa;border:1px solid rgba(37,99,235,0.3);cursor:pointer" data-key="cart-add">+ Ostukorvi</button>
                                        <button onclick="openShopModal({name:'GeForce RTX 5080 16GB ARGB OC Triple Fan',brand:'NVIDIA · PNY',specs:[{l:'VRAM',v:'16GB GDDR7'},{l:'TDP',v:'850W'}],price:2000,priceDisplay:'2000 €'})" class="w-full py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition" style="background:#2563eb;color:#fff" data-key="shop-order">Tellida</button>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- GPU · AMD -->
                    <div id="grid-gpu-amd" class="shop-grid shop-grid-hidden">
                        <div class="flex justify-center py-16">
                            <div class="glass-card p-12 rounded-[40px] text-center" style="min-height:auto;width:320px">
                                <div class="text-4xl mb-4">⏳</div>
                                <p class="text-2xl font-black uppercase tracking-widest text-white mb-2" data-key="shop-soon">Peagi</p>
                                <p class="text-zinc-600 text-[10px] uppercase tracking-widest font-bold">AMD GPU</p>
                            </div>
                        </div>
                    </div>

                    <!-- CPU · Intel -->
                    <div id="grid-cpu-intel" class="shop-grid shop-grid-hidden">
                        <div class="flex justify-center py-16">
                            <div class="glass-card p-12 rounded-[40px] text-center" style="min-height:auto;width:320px">
                                <div class="text-4xl mb-4">⏳</div>
                                <p class="text-2xl font-black uppercase tracking-widest text-white mb-2" data-key="shop-soon">Peagi</p>
                                <p class="text-zinc-600 text-[10px] uppercase tracking-widest font-bold">Intel CPU</p>
                            </div>
                        </div>
                    </div>

                    <!-- CPU · AMD -->
                    <div id="grid-cpu-amd" class="shop-grid shop-grid-hidden">
                        <div class="flex justify-center py-16">
                            <div class="glass-card p-12 rounded-[40px] text-center" style="min-height:auto;width:320px">
                                <div class="text-4xl mb-4">⏳</div>
                                <p class="text-2xl font-black uppercase tracking-widest text-white mb-2" data-key="shop-soon">Peagi</p>
                                <p class="text-zinc-600 text-[10px] uppercase tracking-widest font-bold">AMD CPU</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

    <!-- Shop Order Modal -->
    <div id="shop-modal" style="display:none" class="shop-modal-overlay" onclick="shopModalBackdrop(event)">
        <div class="shop-modal-box">
            <!-- Step 1: Product overview -->
            <div id="shop-step-1" style="padding:32px">
                <button onclick="closeShopModal()" style="position:absolute;top:20px;right:20px;background:none;border:none;color:#52525b;cursor:pointer;font-size:24px;line-height:1;padding:4px">×</button>
                <div id="shop-modal-brand" style="font-size:10px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#3b82f6;margin-bottom:8px"></div>
                <h2 id="shop-modal-name" style="font-size:16px;font-weight:800;color:#fff;margin:0 0 20px;line-height:1.35"></h2>
                <div id="shop-modal-specs" style="margin-bottom:24px"></div>
                <div id="shop-modal-price" style="font-size:30px;font-weight:900;letter-spacing:-0.03em;color:#fff;margin-bottom:24px"></div>
                <button onclick="shopGoToForm()" class="w-full py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition" style="background:#2563eb;color:#fff" data-key="shop-proceed">Edasi</button>
            </div>
            <!-- Step 2: Customer form -->
            <div id="shop-step-2" style="display:none;padding:32px">
                <button onclick="shopBackToProduct()" style="background:none;border:none;color:#52525b;cursor:pointer;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:20px;padding:0;display:flex;align-items:center;gap:6px">← <span data-key="shop-back">Tagasi</span></button>
                <h3 style="font-size:14px;font-weight:800;color:#fff;margin:0 0 20px" data-key="shop-your-info">Teie andmed</h3>
                <div style="display:flex;flex-direction:column;gap:12px">
                    <input id="shop-name"  class="shop-input" type="text"  placeholder="Nimi" autocomplete="name">
                    <input id="shop-email" class="shop-input" type="email" placeholder="E-post" autocomplete="email">
                    <input id="shop-phone" class="shop-input" type="tel"   placeholder="Telefon" autocomplete="tel">
                </div>
                <div id="shop-error" style="display:none;margin-top:12px;color:#f87171;font-size:12px;font-weight:700"></div>
                <button onclick="shopSubmitOrder()" id="shop-submit-btn" class="w-full py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition" style="background:#2563eb;color:#fff;margin-top:20px" data-key="shop-pay">Maksa</button>
            </div>
        </div>
    </div>

    <div id="cart-overlay" class="cart-overlay" onclick="cartBackdrop(event)">
        <div class="cart-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                <div>
                    <p style="font-size:11px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;color:#2563eb;margin-bottom:4px">SFF Lab</p>
                    <h2 style="font-size:22px;font-weight:900;color:white;margin:0" data-key="cart-title">Ostukorv</h2>
                </div>
                <button onclick="closeCart()" style="background:none;border:none;cursor:pointer;color:#71717a;font-size:20px" onmouseover="this.style.color='white'" onmouseout="this.style.color='#71717a'">✕</button>
            </div>
            <div id="cart-items"></div>
            <div id="cart-footer" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06)">
                <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px">
                    <span style="font-size:11px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#52525b" data-key="cart-total-label">Kokku</span>
                    <span id="cart-total" style="font-size:28px;font-weight:900;color:white"></span>
                </div>
                <button onclick="checkoutFromCart()" class="btn-ripple w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all" style="border:none;cursor:pointer;width:100%" data-key="cart-checkout">Vormista tellimus</button>
            </div>
            <div id="cart-empty" style="text-align:center;padding:40px 0;color:#52525b;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase" data-key="cart-empty-text">Ostukorv on tühi</div>
        </div>
    </div>

    </div>

    <script>
        window.pageTranslations = {
            et: {
                'shop-gpu':         'Videokaardid',
                'shop-cpu':         'Protsessorid',
                'shop-order':       'Tellida',
                'shop-soon':        'Peagi',
                'shop-proceed':     'Edasi',
                'shop-back':        'Tagasi',
                'shop-your-info':   'Teie andmed',
                'shop-pay':         'Maksa',
                'cart-add':         '+ Ostukorvi',
                'cart-title':       'Ostukorv',
                'cart-total-label': 'Kokku',
                'cart-checkout':    'Vormista tellimus',
                'cart-empty-text':  'Ostukorv on tühi'
            },
            ru: {
                'shop-gpu':         'Видеокарты',
                'shop-cpu':         'Процессоры',
                'shop-order':       'Заказать',
                'shop-soon':        'Скоро',
                'shop-proceed':     'Далее',
                'shop-back':        'Назад',
                'shop-your-info':   'Ваши данные',
                'shop-pay':         'Оплатить',
                'cart-add':         '+ В корзину',
                'cart-title':       'Корзина',
                'cart-total-label': 'Итого',
                'cart-checkout':    'Оформить заказ',
                'cart-empty-text':  'Корзина пуста'
            },
            en: {
                'shop-gpu':         'Graphics Cards',
                'shop-cpu':         'Processors',
                'shop-order':       'Order',
                'shop-soon':        'Coming Soon',
                'shop-proceed':     'Continue',
                'shop-back':        'Back',
                'shop-your-info':   'Your details',
                'shop-pay':         'Pay',
                'cart-add':         '+ Add to cart',
                'cart-title':       'Cart',
                'cart-total-label': 'Total',
                'cart-checkout':    'Checkout',
                'cart-empty-text':  'Your cart is empty'
            }
        };

        var BRAND_COLORS = {
            nvidia: { bg: '#76b900', color: '#fff', border: '#76b900' },
            amd:    { bg: '#ed1c24', color: '#fff', border: '#ed1c24' },
            intel:  { bg: '#0071c5', color: '#fff', border: '#0071c5' }
        };

        var currentCategory = 'gpu';
        var currentBrands = { gpu: 'nvidia', cpu: 'intel' };

        function switchCategory(cat) {
            currentCategory = cat;
            document.getElementById('tab-gpu').classList.toggle('active', cat === 'gpu');
            document.getElementById('tab-cpu').classList.toggle('active', cat === 'cpu');
            document.getElementById('brands-gpu').style.display = cat === 'gpu' ? 'flex' : 'none';
            document.getElementById('brands-cpu').style.display = cat === 'cpu' ? 'flex' : 'none';
            showGrid(cat, currentBrands[cat]);
        }

        function switchBrand(cat, brand) {
            currentBrands[cat] = brand;
            var brandIds = cat === 'gpu' ? ['nvidia', 'amd'] : ['intel', 'amd'];
            brandIds.forEach(function(b) {
                var el = document.getElementById('brand-' + cat + '-' + b);
                if (!el) return;
                if (b === brand) {
                    var c = BRAND_COLORS[b];
                    el.style.background = c.bg;
                    el.style.color = c.color;
                    el.style.borderColor = c.border;
                } else {
                    el.style.background = '';
                    el.style.color = '';
                    el.style.borderColor = '';
                }
            });
            showGrid(cat, brand);
        }

        function showGrid(cat, brand) {
            ['grid-gpu-nvidia', 'grid-gpu-amd', 'grid-cpu-intel', 'grid-cpu-amd'].forEach(function(id) {
                var el = document.getElementById(id);
                if (!el) return;
                var active = (id === 'grid-' + cat + '-' + brand);
                el.classList.toggle('shop-grid-visible', active);
                el.classList.toggle('shop-grid-hidden', !active);
            });
        }

        // Apply initial brand colors without touching grid visibility
        (function() {
            [['gpu','nvidia'],['cpu','intel']].forEach(function(pair) {
                var cat = pair[0], brand = pair[1];
                var el = document.getElementById('brand-' + cat + '-' + brand);
                if (!el) return;
                var c = BRAND_COLORS[brand];
                el.style.background  = c.bg;
                el.style.color       = c.color;
                el.style.borderColor = c.border;
            });
        })();

        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });

        var _shopCurrentProduct = null;

        function openShopModal(product) {
            _shopCurrentProduct = product;
            document.getElementById('shop-modal-brand').textContent = product.brand;
            document.getElementById('shop-modal-name').textContent  = product.name;
            document.getElementById('shop-modal-price').textContent = product.priceDisplay;
            document.getElementById('shop-modal-specs').innerHTML = product.specs.map(function(s) {
                return '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#52525b;margin-bottom:6px">'
                    + s.l + ' <span style="color:#a1a1aa">' + s.v + '</span></div>';
            }).join('');
            document.getElementById('shop-step-1').style.display = 'block';
            document.getElementById('shop-step-2').style.display = 'none';
            document.getElementById('shop-error').style.display  = 'none';
            document.getElementById('shop-modal').style.display  = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeShopModal() {
            document.getElementById('shop-modal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function shopModalBackdrop(e) {
            if (e.target === document.getElementById('shop-modal')) closeShopModal();
        }

        function shopGoToForm() {
            document.getElementById('shop-step-1').style.display = 'none';
            document.getElementById('shop-step-2').style.display = 'block';
        }

        function shopBackToProduct() {
            document.getElementById('shop-step-2').style.display = 'none';
            document.getElementById('shop-step-1').style.display = 'block';
        }

        async function shopSubmitOrder() {
            var btn   = document.getElementById('shop-submit-btn');
            var errEl = document.getElementById('shop-error');
            var name  = document.getElementById('shop-name').value.trim();
            var email = document.getElementById('shop-email').value.trim();
            var phone = document.getElementById('shop-phone').value.trim();

            if (!name || !email || !phone) {
                errEl.textContent   = 'Palun täitke kõik väljad.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled      = true;
            btn.style.opacity = '0.6';
            errEl.style.display = 'none';

            var lang = (localStorage.getItem('selectedLanguage')) || 'et';
            var p    = _shopCurrentProduct;

            try {
                var orderRes = await fetch('/api/order', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        name:  name,  email: email,  phone: phone,
                        model: p.name,  gpu: p.name,
                        os: 'N/A',  case: 'N/A',  cpu: 'N/A',  ram: 'N/A',  ssd: 'N/A',
                        price:    String(p.price),
                        language: lang
                    })
                });
                var orderData = await orderRes.json();
                if (!orderRes.ok || !orderData.orderNumber) {
                    errEl.textContent   = orderData.error || 'Viga tellimuse loomisel.';
                    errEl.style.display = 'block';
                    btn.disabled = false;  btn.style.opacity = '';
                    return;
                }

                var payRes = await fetch('/api/payment/create', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        amount:        p.price * 100,
                        currency:      'EUR',
                        orderId:       orderData.orderNumber,
                        customerEmail: email,
                        description:   'SFF Lab — ' + p.name
                    })
                });
                var payData = await payRes.json();
                if (!payRes.ok || !payData.paymentUrl) {
                    errEl.textContent   = payData.error || 'Viga makse loomisel.';
                    errEl.style.display = 'block';
                    btn.disabled = false;  btn.style.opacity = '';
                    return;
                }

                window.location.href = payData.paymentUrl;

            } catch (err) {
                errEl.textContent   = 'Ühenduse viga. Proovige uuesti.';
                errEl.style.display = 'block';
                btn.disabled = false;  btn.style.opacity = '';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { closeShopModal(); closeCart(); }
        });

        var _cart;
        try {
            var _cartStored = JSON.parse(localStorage.getItem('sff_cart') || 'null');
            var _cartTtl = 7 * 24 * 60 * 60 * 1000;
            if (_cartStored && _cartStored.ts && (Date.now() - _cartStored.ts < _cartTtl)) {
                _cart = _cartStored.items;
            } else {
                _cart = [];
                localStorage.removeItem('sff_cart');
            }
        } catch(e) { _cart = []; }

        function addToCart(product) {
            var existing = _cart.find(function(i) { return i.title === product.title; });
            if (existing) {
                existing.qty++;
            } else {
                _cart.push(Object.assign({}, product, { qty: 1 }));
            }
            updateCartUI();
            showCartToast();
        }

        function removeFromCart(title) {
            _cart = _cart.filter(function(i) { return i.title !== title; });
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem('sff_cart', JSON.stringify({ items: _cart, ts: Date.now() }));
            var total = _cart.reduce(function(s, i) { return s + i.priceNum * i.qty; }, 0);
            var count = _cart.reduce(function(s, i) { return s + i.qty; }, 0);
            var countEl = document.getElementById('cart-count');
            if (countEl) countEl.innerText = count;
            var itemsEl  = document.getElementById('cart-items');
            var footerEl = document.getElementById('cart-footer');
            var emptyEl  = document.getElementById('cart-empty');
            if (_cart.length === 0) {
                itemsEl.innerHTML        = '';
                footerEl.style.display   = 'none';
                emptyEl.style.display    = 'block';
            } else {
                emptyEl.style.display  = 'none';
                footerEl.style.display = 'block';
                document.getElementById('cart-total').innerText = total + ' €';
                itemsEl.innerHTML = _cart.map(function(item) {
                    return '<div class="cart-item">'
                        + '<div style="flex:1">'
                        + '<div style="font-size:13px;font-weight:700;color:white;margin-bottom:2px">' + item.title + '</div>'
                        + '<div style="font-size:10px;color:#52525b;font-weight:700;text-transform:uppercase;letter-spacing:0.1em">' + item.brand + '</div>'
                        + '</div>'
                        + '<div style="display:flex;align-items:center;gap:12px;margin-left:16px">'
                        + '<span style="font-size:14px;font-weight:800;color:white">' + (item.priceNum * item.qty) + ' €</span>'
                        + '<button onclick="removeFromCart(\'' + item.title.replace(/'/g, "\\'") + '\')" style="background:none;border:none;cursor:pointer;color:#52525b;font-size:16px;padding:4px" onmouseover="this.style.color=\'#f87171\'" onmouseout="this.style.color=\'#52525b\'">✕</button>'
                        + '</div>'
                        + '</div>';
                }).join('');
            }
        }

        function openCart() {
            document.getElementById('cart-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeCart() {
            document.getElementById('cart-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        function cartBackdrop(e) {
            if (e.target === document.getElementById('cart-overlay')) closeCart();
        }

        function checkoutFromCart() {
            if (_cart.length === 0) return;
            closeCart();
            if (_cart.length === 1) {
                var item = _cart[0];
                openShopModal({ name: item.title, brand: item.brand, priceDisplay: item.price, price: item.priceNum, specs: item.specs });
            } else {
                var totalNum = _cart.reduce(function(s, i) { return s + i.priceNum * i.qty; }, 0);
                openShopModal({
                    name:         _cart.map(function(i) { return i.title + (i.qty > 1 ? ' ×' + i.qty : ''); }).join(', '),
                    brand:        'SFF Lab Shop',
                    priceDisplay: totalNum + ' €',
                    price:        totalNum,
                    specs:        _cart.map(function(i) { return { l: i.title, v: i.priceNum * i.qty + ' €' }; })
                });
            }
        }

        // Override nav button to show cart on shop page
        window._navActionClick = function() { openCart(); };

        function updateNavCartBtn() {
            var btn = document.getElementById('nav-action-btn');
            if (!btn) return;
            var lang   = localStorage.getItem('selectedLanguage') || 'et';
            var labels = { et: 'Ostukorv', ru: 'Корзина', en: 'Cart' };
            var label  = labels[lang] || labels.et;
            var count  = _cart.reduce(function(s, i) { return s + i.qty; }, 0);
            btn.innerText        = count > 0 ? label + ' · ' + count : label;
            btn.style.background = '#2563eb';
            btn.style.color      = 'white';
        }

        var _origAddToCart = addToCart;
        addToCart = function(product) { _origAddToCart(product); updateNavCartBtn(); };
        var _origRemoveFromCart = removeFromCart;
        removeFromCart = function(title) { _origRemoveFromCart(title); updateNavCartBtn(); };

        // Patch setLanguage so cart button stays in sync on language switch
        window.addEventListener('load', function() {
            if (window.setLanguage) {
                var _origSetLang = window.setLanguage;
                window.setLanguage = function(lang) {
                    _origSetLang(lang);
                    updateNavCartBtn();
                };
            }
            updateCartUI();
            updateNavCartBtn();
        });

        function showCartToast() {
            var existing = document.getElementById('cart-toast');
            if (existing) existing.remove();

            var t   = document.createElement('div');
            t.id    = 'cart-toast';
            var btn  = document.getElementById('nav-action-btn');
            var rect = btn ? btn.getBoundingClientRect() : null;
            var visible = rect && rect.width > 0 && rect.height > 0;

            if (visible) {
                var cx = rect.left + rect.width / 2;
                var ty = rect.bottom + 10;
                t.style.cssText = 'position:fixed;top:' + ty + 'px;left:' + cx + 'px;'
                    + 'transform:translateX(-50%) translateY(-6px) scale(0.75);opacity:0;'
                    + 'width:auto;z-index:9997;background:#2563eb;color:white;'
                    + 'padding:5px 14px;border-radius:100px;font-size:10px;font-weight:800;'
                    + 'letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;pointer-events:none;'
                    + 'transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),opacity 0.2s ease';
                var toastLang   = localStorage.getItem('selectedLanguage') || 'et';
                var toastLabels = { et: 'Lisatud', ru: 'Добавлено', en: 'Added' };
                t.innerText = toastLabels[toastLang] || toastLabels.et;
                document.body.appendChild(t);

                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        t.style.transform = 'translateX(-50%) translateY(0) scale(1)';
                        t.style.opacity   = '1';
                    });
                });

                btn.style.transform = 'scale(1.1)';
                setTimeout(function() { btn.style.transform = ''; }, 200);

                setTimeout(function() {
                    t.style.opacity   = '0';
                    t.style.transform = 'translateX(-50%) translateY(-8px) scale(0.85)';
                    setTimeout(function() { if (t.parentNode) t.remove(); }, 300);
                }, 1500);
            } else {
                t.style.cssText = 'position:fixed;bottom:24px;right:24px;width:auto;z-index:9997;'
                    + 'background:#2563eb;color:white;padding:10px 16px;border-radius:12px;'
                    + 'font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;'
                    + 'transition:opacity 0.3s;white-space:nowrap;pointer-events:none';
                t.innerText = '+ Ostukorvi';
                document.body.appendChild(t);
                setTimeout(function() {
                    t.style.opacity = '0';
                    setTimeout(function() { if (t.parentNode) t.remove(); }, 300);
                }, 1500);
            }
        }
    </script>
    <script src="nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFF Lab | Konfiguraator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .config-option {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .config-option:hover { background: rgba(255, 255, 255, 0.05); }
        .config-option.selected {
            border-color: #2563eb;
            background: rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Навигация -->
    <nav class="fixed w-full z-50 border-b border-white/5 bg-black/70 backdrop-blur-md">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center py-4 md:py-6 px-6 md:px-10">
            <!-- Ссылка "/" вместо index.html -->
            <a href="/" class="text-2xl font-extrabold tracking-tighter uppercase text-white">
                SFF LAB<span class="text-blue-600">.</span>
            </a>
            <!-- Ссылка "boxes" вместо boxes.html -->
            <a href="boxes" class="text-zinc-400 hover:text-white transition uppercase tracking-widest text-[12px] font-bold">
                ← Tagasi korpuste juurde
            </a>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-12">

            <!-- Левая колонка: Настройки -->
            <div class="lg:col-span-2 space-y-12">
                <section>
                    <h2 class="text-sm font-black uppercase tracking-[0.3em] text-blue-600 mb-8">01. Protsessor</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="config-option selected p-6 rounded-3xl glass-card">
                            <div class="font-bold">Ryzen 5 7500F</div>
                            <div class="text-zinc-500 text-sm italic">Standard Edition</div>
                        </div>
                        <div class="config-option p-6 rounded-3xl glass-card">
                            <div class="font-bold">Ryzen 7 7800X3D</div>
                            <div class="text-zinc-500 text-sm">+320 €</div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-sm font-black uppercase tracking-[0.3em] text-blue-600 mb-8">02. Graafika</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="config-option selected p-6 rounded-3xl glass-card">
                            <div class="font-bold">Radeon RX 9060 XT</div>
                            <div class="text-zinc-500 text-sm">Included</div>
                        </div>
                        <div class="config-option p-6 rounded-3xl glass-card">
                            <div class="font-bold">Radeon RX 9070 XT</div>
                            <div class="text-zinc-500 text-sm">+210 €</div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Правая колонка: Итого -->
            <div class="lg:col-span-1">
                <div class="glass-card p-10 rounded-[40px] sticky top-32">
                    <h3 class="text-2xl font-extrabold uppercase tracking-tighter mb-8">Sinu SFF</h3>
                    <div id="summary-list" class="space-y-4 mb-10 text-sm text-zinc-400">
                        <div class="flex justify-between"><span>Base System</span><span class="text-white" id="base-price">0 €</span></div>
                        <div class="flex justify-between"><span>OS</span><span class="text-white" id="os-name">-</span></div>
                    </div>
                    <div class="border-t border-white/10 pt-8">
                        <div class="flex justify-between items-end mb-10">
                            <span class="uppercase font-bold text-xs tracking-widest text-zinc-500">Kokku</span>
                            <span class="text-5xl font-black tracking-tighter" id="total-price">0 €</span>
                        </div>
                        <button class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-zinc-200 transition">
                            Vormista tellimus
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Простая логика обработки параметров URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const base = params.get('base') || '1845';
            const os = params.get('os') || 'steamos';
            const mode = params.get('mode') || 'core';

            document.getElementById('base-price').innerText = base + ' €';
            document.getElementById('total-price').innerText = base + ' €';
            document.getElementById('os-name').innerText = os === 'steamos' ? 'SteamOS Holo' : 'Windows 11 Pro';
        };
    </script>
</body>
</html>

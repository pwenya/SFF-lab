<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFF Lab — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #111111; color: white; }
        /* Убрал backdrop-filter, чтобы не ломать отрисовку select */
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: visible !important; }
        .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 20px 24px; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 9px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; }
        .s-pending         { background: rgba(161,161,170,0.12); color: #a1a1aa; border: 1px solid rgba(161,161,170,0.2); }
        .s-pending_payment { background: rgba(245,158,11,0.12);  color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
        .s-in_progress     { background: rgba(59,130,246,0.12);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
        .s-ready           { background: rgba(34,197,94,0.12);   color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
        .s-shipped         { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
        .order-row { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.2s; cursor: pointer; overflow: visible !important; }
        .order-row:hover { background: rgba(255,255,255,0.03); }
        .order-row:last-child { border-bottom: none; }
        .filter-btn { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: #52525b; font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: #a1a1aa; }
        .filter-btn.active { background: rgba(37,99,235,0.15); border-color: rgba(37,99,235,0.4); color: #60a5fa; }
        .admin-input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; padding: 12px 16px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .admin-input:focus { border-color: rgba(59,130,246,0.5); }
        .admin-input::placeholder { color: #3f3f46; }
        .status-select { background: #111; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; padding: 4px 8px; font-size: 10px; font-weight: 700; font-family: inherit; outline: none; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; position: relative; z-index: 999; }
        .detail-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 11px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-lbl { color: #52525b; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding-right: 16px; white-space: nowrap; }
        .detail-val { color: #e4e4e7; text-align: right; word-break: break-word; }
        .om-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.82); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .om-overlay.open { opacity: 1; pointer-events: all; }
        .om-box { position: relative; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.09); border-radius: 32px; padding: 36px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; transform: translateY(16px) scale(0.98); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s; opacity: 0; }
        .om-overlay.open .om-box { transform: translateY(0) scale(1); opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; }
        #toast { position: fixed; bottom: 24px; right: 24px; z-index: 99999; padding: 12px 20px; border-radius: 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="antialiased min-h-screen">

<div id="toast"></div>

<div id="detail-modal" class="om-overlay" onclick="_modalBackdrop(event)">
    <div class="om-box" id="detail-box">
        <button onclick="closeDetail()" style="position:absolute;top:16px;right:20px;background:none;border:none;cursor:pointer;color:#71717a;font-size:20px;line-height:1" onmouseover="this.style.color='white'" onmouseout="this.style.color='#71717a'">✕</button>
        <p style="font-size:9px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;color:#2563eb;margin-bottom:8px">SFF Lab</p>
        <div id="detail-order-num" style="font-size:18px;font-weight:900;letter-spacing:0.04em;color:white;margin-bottom:6px"></div>
        <div id="detail-date" style="font-size:10px;color:#52525b;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px"></div>

        <div style="margin-bottom:16px">
            <div style="font-size:9px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:#3f3f46;margin-bottom:10px">Status</div>
            <div style="display:flex;align-items:center;gap:12px">
                <span id="detail-status-badge" class="status-badge"></span>
                <select id="detail-status-select" class="status-select" onchange="updateStatusFromDetail()">
                    <option value="pending">Pending</option>
                    <option value="pending_payment">Pending Payment</option>
                    <option value="in_progress">In Progress</option>
                    <option value="ready">Ready</option>
                    <option value="shipped">Shipped</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom:16px">
            <div style="font-size:9px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:#3f3f46;margin-bottom:10px">Customer</div>
            <div id="detail-customer"></div>
        </div>

        <div>
            <div style="font-size:9px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:#3f3f46;margin-bottom:10px">Configuration</div>
            <div id="detail-config"></div>
        </div>
    </div>
</div>

<div id="screen-login" class="min-h-screen flex items-center justify-center px-6">
    <div style="width:100%;max-width:380px">
        <p style="font-size:10px;font-weight:800;letter-spacing:0.3em;text-transform:uppercase;color:#2563eb;margin-bottom:8px">SFF Lab</p>
        <h1 style="font-size:32px;font-weight:900;letter-spacing:-0.03em;text-transform:uppercase;margin-bottom:4px">Admin</h1>
        <p style="font-size:11px;color:#52525b;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:32px">Dashboard</p>
        <input id="login-password" type="password" class="admin-input w-full mb-4" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
        <div id="login-error" style="display:none;font-size:10px;color:#f87171;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;text-align:center">Incorrect password</div>
        <button onclick="doLogin()" style="width:100%;background:#2563eb;border:none;color:white;padding:14px;border-radius:14px;font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:background 0.2s" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">Sign In</button>
    </div>
</div>

<div id="screen-dashboard" style="display:none" class="min-h-screen">
    <div style="border-bottom:1px solid rgba(255,255,255,0.05);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(5,5,5,0.92);backdrop-filter:blur(12px);z-index:50">
        <div style="display:flex;align-items:center;gap:16px">
            <span style="font-size:20px;font-weight:900;letter-spacing:-0.03em;text-transform:uppercase">SFF LAB<span style="color:#2563eb">.</span></span>
            <span style="font-size:9px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;color:#2563eb;background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.2);padding:3px 10px;border-radius:100px">Admin</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
            <span id="refresh-indicator" style="font-size:9px;color:#3f3f46;font-weight:700;letter-spacing:0.1em;text-transform:uppercase"></span>
            <button onclick="loadOrders()" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#71717a;font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.color='white'" onmouseout="this.style.color='#71717a'">Refresh</button>
            <button onclick="doLogout()" style="background:none;border:none;color:#52525b;font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:color 0.2s" onmouseover="this.style.color='white'" onmouseout="this.style.color='#52525b'">Logout</button>
        </div>
    </div>

    <div style="max-width:1400px;margin:0 auto;padding:32px 24px">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">
            <div class="stat-card">
                <div id="stat-total" style="font-size:28px;font-weight:900;letter-spacing:-0.03em;color:white;margin-bottom:4px">—</div>
                <div style="font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#52525b">Total Orders</div>
            </div>
            <div class="stat-card">
                <div id="stat-pending" style="font-size:28px;font-weight:900;letter-spacing:-0.03em;color:#a1a1aa;margin-bottom:4px">—</div>
                <div style="font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#52525b">New</div>
            </div>
            <div class="stat-card">
                <div id="stat-payment" style="font-size:28px;font-weight:900;letter-spacing:-0.03em;color:#f59e0b;margin-bottom:4px">—</div>
                <div style="font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#52525b">Pending Payment</div>
            </div>
            <div class="stat-card">
                <div id="stat-progress" style="font-size:28px;font-weight:900;letter-spacing:-0.03em;color:#60a5fa;margin-bottom:4px">—</div>
                <div style="font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#52525b">In Progress</div>
            </div>
            <div class="stat-card">
                <div id="stat-done" style="font-size:28px;font-weight:900;letter-spacing:-0.03em;color:#4ade80;margin-bottom:4px">—</div>
                <div style="font-size:9px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#52525b">Ready / Shipped</div>
            </div>
        </div>

        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:20px">
            <div style="display:flex;flex-wrap:wrap;gap:6px">
                <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('pending',this)">New</button>
                <button class="filter-btn" onclick="setFilter('pending_payment',this)">Pending Payment</button>
                <button class="filter-btn" onclick="setFilter('in_progress',this)">In Progress</button>
                <button class="filter-btn" onclick="setFilter('ready',this)">Ready</button>
                <button class="filter-btn" onclick="setFilter('shipped',this)">Shipped</button>
            </div>
            <input id="search-input" type="text" class="admin-input" style="padding:8px 14px;font-size:11px;min-width:220px;margin-left:auto" placeholder="Search order # or customer..." oninput="renderTable()">
        </div>

        <div class="glass rounded-[24px]">
            <div style="display:grid;grid-template-columns:160px 110px 1fr 140px 90px 140px 120px;gap:0;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Order #</span>
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Date</span>
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Customer</span>
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Config</span>
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Price</span>
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Status</span>
                <span style="font-size:9px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#3f3f46">Update</span>
            </div>
            <div id="orders-table-body" style="overflow: visible !important;">
                <div style="padding:48px;text-align:center;color:#3f3f46;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase">Loading orders…</div>
            </div>
        </div>
        <div id="no-orders" style="display:none;padding:60px;text-align:center;color:#3f3f46;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase">No orders found</div>
    </div>
</div>

<script>
    var TOKEN        = '';
    var ALL_ORDERS   = [];
    var activeFilter = 'all';
    var currentDetailOrder = null;
    var refreshTimer = null;
    var refreshCountdown = 60;

    var STATUS_LABELS = {
        pending:         'New',
        pending_payment: 'Pending Payment',
        in_progress:     'In Progress',
        ready:           'Ready',
        shipped:         'Shipped'
    };

    function doLogin() {
        var pw = document.getElementById('login-password').value.trim();
        if (!pw) return;
        TOKEN = pw;
        sessionStorage.setItem('adminToken', pw);
        document.getElementById('login-error').style.display = 'none';
        loadOrders();
    }

    function doLogout() {
        TOKEN = '';
        sessionStorage.removeItem('adminToken');
        ALL_ORDERS = [];
        document.getElementById('screen-dashboard').style.display = 'none';
        document.getElementById('screen-login').style.display = 'flex';
        document.getElementById('login-password').value = '';
        if (refreshTimer) clearInterval(refreshTimer);
    }

    function showDashboard() {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-dashboard').style.display = 'block';
        startAutoRefresh();
    }

    function loadOrders() {
        refreshCountdown = 60;
        fetch('/api/orders', {
            headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/json' }
        })
        .then(function (r) {
            if (r.status === 401) { doLogout(); return null; }
            if (!r.ok) throw new Error('Server error ' + r.status);
            return r.json();
        })
        .then(function (data) {
            if (!data) return;
            ALL_ORDERS = (data.orders || []).sort(function (a, b) {
                return new Date(b.createdAt) - new Date(a.createdAt);
            });
            updateStats();
            renderTable();
            showDashboard();
            var now = new Date();
            document.getElementById('refresh-indicator').innerText =
                'Last: ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
        })
        .catch(function (err) {
            console.error(err);
            if (document.getElementById('screen-dashboard').style.display === 'block') {
                showToast('Failed to refresh orders', '#f87171');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        });
    }

    function startAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(function () {
            refreshCountdown--;
            if (refreshCountdown <= 0) {
                refreshCountdown = 60;
                loadOrders();
            }
        }, 1000);
    }

    function updateStats() {
        var t = ALL_ORDERS.length;
        var counts = { pending: 0, pending_payment: 0, in_progress: 0, ready: 0, shipped: 0 };
        ALL_ORDERS.forEach(function (o) { if (counts[o.status] !== undefined) counts[o.status]++; });
        document.getElementById('stat-total').innerText    = t;
        document.getElementById('stat-pending').innerText  = counts.pending;
        document.getElementById('stat-payment').innerText  = counts.pending_payment;
        document.getElementById('stat-progress').innerText = counts.in_progress;
        document.getElementById('stat-done').innerText     = counts.ready + counts.shipped;
    }

    function setFilter(f, btn) {
        activeFilter = f;
        document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderTable();
    }

    function renderTable() {
        var search = (document.getElementById('search-input').value || '').toLowerCase();
        var filtered = ALL_ORDERS.filter(function (o) {
            var matchFilter = activeFilter === 'all' || o.status === activeFilter;
            var matchSearch = !search
                || (o.orderNumber || '').toLowerCase().includes(search)
                || (o.name        || '').toLowerCase().includes(search)
                || (o.email       || '').toLowerCase().includes(search);
            return matchFilter && matchSearch;
        });

        var body = document.getElementById('orders-table-body');
        var none = document.getElementById('no-orders');

        if (filtered.length === 0) {
            body.innerHTML = '';
            none.style.display = 'block';
            return;
        }
        none.style.display = 'none';

        body.innerHTML = filtered.map(function (o) {
            var date = o.createdAt ? new Date(o.createdAt) : null;
            var dateStr = date ? date.getDate() + '.' + (date.getMonth()+1) + '.' + date.getFullYear() : '—';
            return '<div class="order-row" style="display:grid;grid-template-columns:160px 110px 1fr 140px 90px 140px 120px;gap:0;padding:14px 20px;align-items:center" onclick="openDetail(\'' + esc(o.orderNumber) + '\')">'
                + '<span style="font-size:11px;font-weight:800;letter-spacing:0.06em;color:white">' + esc(o.orderNumber) + '</span>'
                + '<span style="font-size:11px;color:#71717a;font-weight:600">' + dateStr + '</span>'
                + '<div style="min-width:0">'
                + '<div style="font-size:12px;color:#e4e4e7;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(o.name) + '</div>'
                + '<div style="font-size:10px;color:#52525b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(o.email) + '</div>'
                + '</div>'
                + '<span style="font-size:10px;color:#71717a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(o.model || '') + '</span>'
                + '<span style="font-size:12px;font-weight:800;color:white">' + esc(o.price || '') + '</span>'
                + '<span><span class="status-badge s-' + esc(o.status) + '">' + (STATUS_LABELS[o.status] || o.status) + '</span></span>'
                + '<span onclick="event.stopPropagation()">'
                + '<select class="status-select" onchange="quickUpdateStatus(\'' + esc(o.orderNumber) + '\',this)">'
                + statusOptions(o.status)
                + '</select>'
                + '</span>'
                + '</div>';
        }).join('');
    }

    function statusOptions(current) {
        return ['pending','pending_payment','in_progress','ready','shipped'].map(function (s) {
            return '<option value="' + s + '"' + (s === current ? ' selected' : '') + '>' + (STATUS_LABELS[s]) + '</option>';
        }).join('');
    }

    function quickUpdateStatus(orderNumber, selectEl) {
        var newStatus = selectEl.value;
        callUpdateStatus(orderNumber, newStatus, function (ok) {
            if (ok) {
                var o = ALL_ORDERS.find(function (x) { return x.orderNumber === orderNumber; });
                if (o) { o.status = newStatus; o.updatedAt = new Date().toISOString(); }
                updateStats();
                renderTable();
                showToast('Status updated → ' + STATUS_LABELS[newStatus], '#4ade80');
            } else {
                renderTable();
            }
        });
    }

    function updateStatusFromDetail() {
        if (!currentDetailOrder) return;
        var newStatus = document.getElementById('detail-status-select').value;
        callUpdateStatus(currentDetailOrder.orderNumber, newStatus, function (ok) {
            if (ok) {
                currentDetailOrder.status = newStatus;
                var o = ALL_ORDERS.find(function (x) { return x.orderNumber === currentDetailOrder.orderNumber; });
                if (o) { o.status = newStatus; }
                var badge = document.getElementById('detail-status-badge');
                badge.className = 'status-badge s-' + newStatus;
                badge.innerText = STATUS_LABELS[newStatus] || newStatus;
                updateStats();
                renderTable();
                showToast('Status updated → ' + STATUS_LABELS[newStatus], '#4ade80');
            }
        });
    }

    function callUpdateStatus(orderNumber, newStatus, cb) {
        fetch('/api/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
            body: JSON.stringify({ orderNumber: orderNumber, status: newStatus })
        })
        .then(function (r) { return r.json(); })
        .then(function (d) {
            if (d.success) { cb(true); }
            else { showToast('Update failed: ' + (d.error || 'unknown'), '#f87171'); cb(false); }
        })
        .catch(function () { showToast('Network error', '#f87171'); cb(false); });
    }

    function openDetail(orderNumber) {
        var o = ALL_ORDERS.find(function (x) { return x.orderNumber === orderNumber; });
        if (!o) return;
        currentDetailOrder = o;
        document.getElementById('detail-order-num').innerText = o.orderNumber;
        var date = o.createdAt ? new Date(o.createdAt) : null;
        document.getElementById('detail-date').innerText = date ? date.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
        var badge = document.getElementById('detail-status-badge');
        badge.className = 'status-badge s-' + o.status;
        badge.innerText = STATUS_LABELS[o.status] || o.status;
        document.getElementById('detail-status-select').value = o.status;
        document.getElementById('detail-customer').innerHTML = dRow('Name', esc(o.name || '')) + dRow('Email', '<a href="mailto:' + esc(o.email) + '" style="color:#60a5fa">' + esc(o.email || '') + '</a>') + dRow('Phone', esc(o.phone || '—'));
        document.getElementById('detail-config').innerHTML = dRow('Model', esc(o.model || '')) + dRow('OS', esc(o.os || '')) + dRow('Case', esc(o['case']|| '')) + dRow('CPU', esc(o.cpu || '')) + dRow('GPU', esc(o.gpu || '')) + dRow('RAM', esc(o.ram || '')) + dRow('SSD', esc(o.ssd || '')) + (o.psu ? dRow('PSU', esc(o.psu)) : '') + (o.controller ? dRow('Controller', esc(o.controller)) : '') + (o.scenario ? dRow('Scenario', esc(o.scenario)) : '') + '<div style="padding-top:12px;margin-top:4px;border-top:1px solid rgba(255,255,255,0.06)">' + dRow('Price', '<strong style="color:white;font-size:16px">' + esc(o.price || '') + '</strong>') + dRow('Est. Delivery', esc(o.estimatedDelivery || '')) + '</div>';
        document.getElementById('detail-modal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
        document.getElementById('detail-modal').classList.remove('open');
        document.body.style.overflow = '';
        currentDetailOrder = null;
    }

    function _modalBackdrop(e) { if (e.target === document.getElementById('detail-modal')) closeDetail(); }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDetail(); });
    function dRow(label, value) { return '<div class="detail-row"><span class="detail-lbl">' + label + '</span><span class="detail-val">' + value + '</span></div>'; }
    function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function showToast(msg, color) {
        var t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = (color === '#4ade80') ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
        t.style.border = '1px solid ' + color + '44';
        t.style.color = color;
        t.classList.add('show');
        setTimeout(function () { t.classList.remove('show'); }, 3000);
    }
    (function () {
        var saved = sessionStorage.getItem('adminToken');
        if (saved) { TOKEN = saved; loadOrders(); }
        document.getElementById('login-password').focus();
    })();
</script>
</body>
</html>

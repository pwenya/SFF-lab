<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFF Lab | Коробки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .color-circle { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 2px solid transparent; }
        .color-circle.active { border-color: #2563eb; transform: scale(1.15); box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-50 border-b border-white/5 bg-black/70 backdrop-blur-md">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center py-6 px-10">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter uppercase">
                SFF LAB<span class="text-blue-600">.</span>
            </a>
            <a href="#" class="bg-white text-black px-8 py-3 rounded-full hover:bg-zinc-200 transition uppercase tracking-widest text-[14px] font-black">Статус заказа</a>
        </div>
    </nav>

    <main class="min-h-screen pt-40 pb-20 px-6 flex items-center justify-center">
        <div class="max-w-6xl w-full flex flex-col md:flex-row items-center gap-16">

            <!-- ГАЛЕРЕЯ (Слева) -->
            <div class="flex-1 w-full relative">
                <div class="glass-panel rounded-[40px] p-10 flex items-center justify-center min-h-[400px] md:min-h-[600px]">
                    <img id="case-image" src="IMG/MoodBlack.1.png" class="max-h-[500px] w-auto transition-all duration-500 drop-shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                </div>

                <!-- Стрелки под фото -->
                <div class="flex justify-center space-x-6 mt-10">
                    <button onclick="navPhoto(-1)" class="glass-panel p-5 rounded-2xl hover:bg-white/10 transition active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <button onclick="navPhoto(1)" class="glass-panel p-5 rounded-2xl hover:bg-white/10 transition active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>

            <!-- ИНФОРМАЦИЯ И КРУЖОЧКИ (Справа) -->
            <div class="flex flex-row md:flex-col items-center md:items-start gap-12">

                <!-- Вертикальные переключатели цвета -->
                <div class="flex flex-col gap-6 order-1 md:order-2">
                    <div onclick="switchColor('black')" id="circle-black" class="color-circle active w-12 h-12 rounded-full bg-black border border-white/20"></div>
                    <div onclick="switchColor('white')" id="circle-white" class="color-circle w-12 h-12 rounded-full bg-white border border-black/10"></div>
                </div>

                <div class="order-2 md:order-1 text-left">
                    <h2 class="text-5xl font-black uppercase tracking-tighter mb-4 text-white">Mood v1</h2>
                    <p class="text-zinc-500 uppercase text-[11px] tracking-[0.4em] font-bold leading-loose">
                        Премиальный SFF дизайн<br>Текстильная панель<br>Экосистема SFF Lab
                    </p>
                </div>

            </div>
        </div>
    </main>

    <script>
        const sets = {
            black: ['IMG/MoodBlack.1.png', 'IMG/MoodBlack.2.png', 'IMG/MoodBlack.3.png'],
            white: ['IMG/MoodLight.1.jpg', 'IMG/MoodLight.2.jpg', 'IMG/MoodLight.3.png']
        };

        let currentSet = 'black';
        let currentIndex = 0;
        const mainImg = document.getElementById('case-image');

        function switchColor(color) {
            currentSet = color;
            currentIndex = 0;

            // Обновляем кружочки
            document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('active'));
            document.getElementById(`circle-${color}`).classList.add('active');

            updateView();
        }

        function navPhoto(dir) {
            currentIndex = (currentIndex + dir + 3) % 3;
            updateView();
        }

        function updateView() {
            mainImg.style.opacity = '0';
            mainImg.style.transform = 'scale(0.95)';

            setTimeout(() => {
                mainImg.src = sets[currentSet][currentIndex];
                mainImg.style.opacity = '1';
                mainImg.style.transform = 'scale(1)';
            }, 250);
        }
    </script>
</body>
</html>

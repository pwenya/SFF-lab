<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFF Lab | Коробки</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); position: relative; width: 100%; height: 350px;
            min-height: 350px; max-height: 350px; overflow: hidden;
        }
        @media (min-width: 768px) { .glass-panel { height: 600px; min-height: 600px; max-height: 600px; width: 750px; } }
        .case-stack-img {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: auto; height: auto; max-width: 85%; max-height: 85%; object-fit: contain;
            transition: opacity 0.4s ease-in-out; pointer-events: none; will-change: opacity;
            opacity: 0; image-rendering: -webkit-optimize-contrast;
        }
        .case-stack-img.active { opacity: 1; }
        .mood-white-fix { transform: translate(-48.5%, -50%) !important; }
        .color-circle {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15); position: relative; touch-action: manipulation;
        }
        #mood-black, #ridge-black, #terra-graphite { border: 1px solid rgba(255, 255, 255, 0.25); }
        @media (hover: hover) { .color-circle:hover { border-color: rgba(255, 255, 255, 0.5); transform: scale(1.05); } }
        .color-circle.active { border-color: #2563eb !important; border-width: 2px; transform: scale(1.15); box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        .product-section { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 60px 0; }
        .product-section:last-child { border-bottom: none; }
        @media (min-width: 768px) { .product-section { padding: 100px 0; } }
        .nav-btn-inside {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; z-index: 50;
        }
        .btn-left { left: 15px; }
        .btn-right { right: 15px; }
        .panel-badge {
            position: absolute; z-index: 10; backdrop-filter: blur(8px);
            font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
            padding: 5px 11px; border-radius: 10px;
        }
        .badge-volume {
            bottom: 14px; left: 14px;
            background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.14); color: white;
        }
        .badge-ps5 {
            top: 14px; left: 14px;
            background: rgba(37,99,235,0.14); border: 1px solid rgba(37,99,235,0.28); color: #93c5fd;
        }
        .ps5-tag {
            display: inline-block; font-size: 8px; font-weight: 800; letter-spacing: 0.12em;
            text-transform: uppercase; color: #60a5fa; background: rgba(37,99,235,0.1);
            border: 1px solid rgba(37,99,235,0.25); border-radius: 6px; padding: 3px 8px; margin-top: 6px;
        }
        .order-btn {
            background: #2563eb; border: none; border-radius: 14px;
            color: white; padding: 11px 16px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.12em; text-decoration: none;
            display: inline-block; transition: all 0.2s; white-space: nowrap; font-family: inherit;
            box-shadow: 0 8px 20px rgba(37,99,235,0.2);
        }
        .order-btn:hover { background: #3b82f6; box-shadow: 0 8px 24px rgba(37,99,235,0.35); }
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="antialiased">
    <main class="pt-20">
        <section class="product-section flex items-center justify-center px-6" data-model="terra">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16">
                <div class="w-full md:w-[750px] shrink-0">
                    <div class="glass-panel rounded-[30px] md:rounded-[40px] touch-pan-y" id="container-terra">
                        <button onclick="nav('terra', -1)" class="nav-btn-inside btn-left hidden md:flex">←</button>
                        <img id="img-terra-graphite" src="IMG/TerraGraphite.1.png" class="case-stack-img active">
                        <img id="img-terra-jade" src="IMG/TerraJade.1.png" class="case-stack-img">
                        <img id="img-terra-silver" src="IMG/TerraSilver.1.png" class="case-stack-img">
                        <div class="panel-badge badge-volume">~10.4 L</div>
                        <button onclick="nav('terra', 1)" class="nav-btn-inside btn-right hidden md:flex">→</button>
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start gap-5 w-full md:w-[300px]">
                    <div class="text-center md:text-left">
                        <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-2">Terra <span id="title-terra">Graphite</span></h2>
                        <p data-key="terra-sub" class="text-zinc-500 uppercase text-[10px] md:text-[11px] tracking-[0.4em] font-bold">Crafted for Gamers</p>
                    </div>
                    <div class="flex flex-row gap-4">
                        <div id="terra-graphite" class="color-circle active w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#1c1c1c]"></div>
                        <div id="terra-jade" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#4d5d53]"></div>
                        <div id="terra-silver" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#d1d5db]"></div>
                    </div>
                    <div>
                        <p data-key="order-heading" class="text-[9px] font-black uppercase tracking-[0.25em] text-blue-500 mb-3">Mine tellima</p>
                        <div class="flex gap-2">
                            <a id="btn-core-terra" href="configurator.html?base=2350&mode=core&os=steamos&case=Terra&color=Graphite" class="order-btn" data-key="btn-core">Baas</a>
                            <a id="btn-plus-terra" href="configurator.html?base=1999&mode=plus&os=steamos&case=Terra&color=Graphite" class="order-btn" data-key="btn-plus">Baas+</a>
                            <a id="btn-enthusiast-terra" href="configurator.html?base=2350&mode=enthusiast&os=steamos&case=Terra&color=Graphite" class="order-btn" data-key="btn-enthusiast">Pane kokku</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="product-section flex items-center justify-center px-6" data-model="ridge">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16">
                <div class="w-full md:w-[750px] shrink-0">
                    <div class="glass-panel rounded-[30px] md:rounded-[40px] touch-pan-y" id="container-ridge">
                        <button onclick="nav('ridge', -1)" class="nav-btn-inside btn-left hidden md:flex">←</button>
                        <img id="img-ridge-black" src="IMG/RidgeBlack.1.png" class="case-stack-img active">
                        <img id="img-ridge-white" src="IMG/RidgeWhite.1.png" class="case-stack-img">
                        <div class="panel-badge badge-volume">~12.59 L</div>
                        <button onclick="nav('ridge', 1)" class="nav-btn-inside btn-right hidden md:flex">→</button>
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start gap-5 w-full md:w-[300px]">
                    <div class="text-center md:text-left">
                        <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-2">Ridge <span id="title-ridge">Black</span></h2>
                        <p data-key="ridge-sub" class="text-zinc-500 uppercase text-[10px] md:text-[11px] tracking-[0.4em] font-bold">Slim Console Format</p>
                    </div>
                    <div class="flex flex-row gap-4">
                        <div id="ridge-black" class="color-circle active w-10 h-10 md:w-12 md:h-12 rounded-full bg-black"></div>
                        <div id="ridge-white" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-white"></div>
                    </div>
                    <div>
                        <p data-key="order-heading" class="text-[9px] font-black uppercase tracking-[0.25em] text-blue-500 mb-3">Mine tellima</p>
                        <div class="flex gap-2">
                            <a id="btn-core-ridge" href="configurator.html?base=2350&mode=core&os=steamos&case=Ridge&color=Black" class="order-btn" data-key="btn-core">Baas</a>
                            <a id="btn-plus-ridge" href="configurator.html?base=1999&mode=plus&os=steamos&case=Ridge&color=Black" class="order-btn" data-key="btn-plus">Baas+</a>
                            <a id="btn-enthusiast-ridge" href="configurator.html?base=2350&mode=enthusiast&os=steamos&case=Ridge&color=Black" class="order-btn" data-key="btn-enthusiast">Pane kokku</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="product-section flex items-center justify-center px-6" data-model="mood">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16">
                <div class="w-full md:w-[750px] shrink-0">
                    <div class="glass-panel rounded-[30px] md:rounded-[40px] touch-pan-y" id="container-mood">
                        <button onclick="nav('mood', -1)" class="nav-btn-inside btn-left hidden md:flex">←</button>
                        <img id="img-mood-black" src="IMG/MoodBlack.1.png" class="case-stack-img active">
                        <img id="img-mood-white" src="IMG/MoodLight.1.png" class="case-stack-img mood-white-fix">
                        <div class="panel-badge badge-volume">~13.6 L</div>
                        <button onclick="nav('mood', 1)" class="nav-btn-inside btn-right hidden md:flex">→</button>
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start gap-5 w-full md:w-[300px]">
                    <div class="text-center md:text-left">
                        <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-2">Mood <span id="title-mood">Black</span></h2>
                        <p data-key="mood-sub" class="text-zinc-500 uppercase text-[10px] md:text-[11px] tracking-[0.4em] font-bold">Premium SFF Design</p>
                    </div>
                    <div class="flex flex-row gap-4">
                        <div id="mood-black" class="color-circle active w-10 h-10 md:w-12 md:h-12 rounded-full bg-black"></div>
                        <div id="mood-white" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-white"></div>
                    </div>
                    <div>
                        <p data-key="order-heading" class="text-[9px] font-black uppercase tracking-[0.25em] text-blue-500 mb-3">Mine tellima</p>
                        <div class="flex gap-2">
                            <a id="btn-core-mood" href="configurator.html?base=2350&mode=core&os=steamos&case=Mood&color=Black" class="order-btn" data-key="btn-core">Baas</a>
                            <a id="btn-plus-mood" href="configurator.html?base=1999&mode=plus&os=steamos&case=Mood&color=Black" class="order-btn" data-key="btn-plus">Baas+</a>
                            <a id="btn-enthusiast-mood" href="configurator.html?base=2350&mode=enthusiast&os=steamos&case=Mood&color=Black" class="order-btn" data-key="btn-enthusiast">Pane kokku</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="nav.js"></script>
    <script>
        window.pageTranslations = {
            et: {
                'order-heading': 'Mine tellima',
                'btn-core': 'Baas',
                'btn-plus': 'Baas+',
                'btn-enthusiast': 'Pane kokku',
                'terra-sub': 'Loodud mängijatele',
                'ridge-sub': 'Slim konsooli formaat',
                'mood-sub': 'Premium SFF disain'
            },
            ru: {
                'order-heading': 'Заказать',
                'btn-core': 'База',
                'btn-plus': 'База+',
                'btn-enthusiast': 'Собери сам',
                'terra-sub': 'Для геймеров',
                'ridge-sub': 'Тонкий консольный формат',
                'mood-sub': 'Премиум SFF дизайн'
            },
            en: {
                'order-heading': 'Order now',
                'btn-core': 'Base',
                'btn-plus': 'Base+',
                'btn-enthusiast': 'Build your own',
                'terra-sub': 'Crafted for Gamers',
                'ridge-sub': 'Slim Console Format',
                'mood-sub': 'Premium SFF Design'
            }
        };

        var caseColorNames = {
            mood:  { black: 'Black', white: 'Light' },
            terra: { graphite: 'Graphite', jade: 'Jade', silver: 'Silver' },
            ridge: { black: 'Black', white: 'White' }
        };
        function updateOrderLinks(model) {
            var colorKey  = config[model].current;
            var colorName = caseColorNames[model][colorKey] || colorKey;
            var modelName = model.charAt(0).toUpperCase() + model.slice(1);
            var base = 'configurator.html?os=steamos&case=' + modelName + '&color=' + colorName;
            document.getElementById('btn-core-' + model).href        = base + '&base=2350&mode=core';
            document.getElementById('btn-plus-' + model).href        = base + '&base=1999&mode=plus';
            document.getElementById('btn-enthusiast-' + model).href  = base + '&base=2350&mode=enthusiast';
        }

        var config = {
            mood:  { current: 'black',    idx: 0, black:    ['IMG/MoodBlack.1.png','IMG/MoodBlack.2.png','IMG/MoodBlack.3.png'],       white:    ['IMG/MoodLight.1.png','IMG/MoodLight.2.png','IMG/MoodLight.3.png'] },
            terra: { current: 'graphite', idx: 0, graphite: ['IMG/TerraGraphite.1.png','IMG/TerraGraphite.2.png','IMG/TerraGraphite.3.png'], jade: ['IMG/TerraJade.1.png','IMG/TerraJade.2.png','IMG/TerraJade.3.png'], silver: ['IMG/TerraSilver.1.png','IMG/TerraSilver.2.png','IMG/TerraSilver.3.png'] },
            ridge: { current: 'black',    idx: 0, black:    ['IMG/RidgeBlack.1.png','IMG/RidgeBlack.2.png'],                             white:    ['IMG/RidgeWhite.1.png','IMG/RidgeWhite.2.png'] }
        };
        var colorNames = { black: 'Black', white: 'Light', graphite: 'Graphite', jade: 'Jade', silver: 'Silver' };
        var lastCall = 0;

        function setColor(model, color) {
            var now = Date.now();
            if (now - lastCall < 300) return;
            lastCall = now;
            var m = config[model];
            m.current = color;
            document.querySelectorAll('[id^="' + model + '-"]').forEach(function (c) { c.classList.remove('active'); });
            document.getElementById(model + '-' + color).classList.add('active');
            document.getElementById('title-' + model).innerText = colorNames[color];
            document.querySelectorAll('[id^="img-' + model + '-"]').forEach(function (img) { img.classList.remove('active'); });
            document.getElementById('img-' + model + '-' + color).classList.add('active');
            updateOrderLinks(model);
        }

        function nav(model, dir) {
            var m = config[model];
            var colors = Object.keys(m).filter(function (k) { return Array.isArray(m[k]); });
            var len = m[m.current].length;
            m.idx = (m.idx + dir + len) % len;
            colors.forEach(function (color) {
                var img = document.getElementById('img-' + model + '-' + color);
                if (img) img.src = m[color][m.idx];
            });
        }

        ['mood', 'terra', 'ridge'].forEach(function (model) {
            var container = document.getElementById('container-' + model);
            var startX = 0;
            container.addEventListener('touchstart', function (e) { startX = e.changedTouches[0].screenX; }, { passive: true });
            container.addEventListener('touchend', function (e) {
                var endX = e.changedTouches[0].screenX;
                if (startX - endX > 40) nav(model, 1);
                else if (endX - startX > 40) nav(model, -1);
            }, { passive: true });
            document.querySelectorAll('[id^="' + model + '-"]').forEach(function (circle) {
                var color = circle.id.split('-')[1];
                var trigger = function (e) { e.preventDefault(); setColor(model, color); };
                circle.addEventListener('click', trigger);
                circle.addEventListener('touchend', trigger);
            });
        });

        window.onload = function () {
            Object.values(config).forEach(function (m) {
                Object.values(m).forEach(function (arr) {
                    if (Array.isArray(arr)) arr.forEach(function (src) { var i = new Image(); i.src = src; });
                });
            });
            ['terra','ridge','mood'].forEach(updateOrderLinks);
        };
    </script>
</body>
</html>

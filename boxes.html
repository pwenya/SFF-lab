<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFF Lab | Коробки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }

        .case-img {
            transition: opacity 0.4s ease, transform 0.4s ease;
            image-rendering: auto;
            will-change: opacity, transform;
            /* Гарантируем центровку */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .color-circle { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 2px solid transparent; }
        .color-circle.active { border-color: #2563eb; transform: scale(1.15); box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); }

        .product-section { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 60px 0; }
        @media (min-width: 768px) { .product-section { padding: 100px 0; } }

        .nav-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Прячем стрелки на мобилках */
        @media (max-width: 767px) {
            .nav-arrows { display: none; }
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-50 border-b border-white/5 bg-black/70 backdrop-blur-md">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center py-4 md:py-6 px-6 md:px-10">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter uppercase">
                SFF LAB<span class="text-blue-600">.</span>
            </a>
            <a href="#" class="bg-white text-black px-6 md:px-8 py-2 md:py-3 rounded-full hover:bg-zinc-200 transition uppercase tracking-widest text-[12px] md:text-[14px] font-black">Статус заказа</a>
        </div>
    </nav>

    <main class="pt-20">

        <!-- КАРТОЧКА 1: MOOD -->
        <section class="product-section flex items-center justify-center px-6" data-model="mood">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center gap-8 md:gap-16">
                <div class="w-full md:flex-1">
                    <div class="glass-panel rounded-[30px] md:rounded-[40px] p-6 md:p-10 flex items-center justify-center h-[350px] md:h-[600px] overflow-hidden touch-pan-y">
                        <img id="img-mood" src="IMG/MoodBlack.1.png" class="case-img pointer-events-none">
                    </div>
                    <div class="nav-arrows flex justify-center space-x-6 mt-10">
                        <button onclick="nav('mood', -1)" class="nav-btn p-5 rounded-2xl w-16 h-16">←</button>
                        <button onclick="nav('mood', 1)" class="nav-btn p-5 rounded-2xl w-16 h-16">→</button>
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start gap-6 md:gap-12 w-full md:w-auto">
                    <!-- Кружочки: на мобилках в ряд под фото, на десктопе вертикально -->
                    <div class="flex flex-row md:flex-col gap-6 order-2 md:order-2">
                        <div onclick="setColor('mood', 'black')" id="mood-black" class="color-circle active w-10 h-10 md:w-12 md:h-12 rounded-full bg-black border border-white/10"></div>
                        <div onclick="setColor('mood', 'white')" id="mood-white" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-white border border-black/10"></div>
                    </div>
                    <div class="text-center md:text-left order-1 md:order-1">
                        <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-2 md:mb-4">Mood v1</h2>
                        <p class="text-zinc-500 uppercase text-[10px] md:text-[11px] tracking-[0.4em] font-bold">Premium SFF Design</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- КАРТОЧКА 2: TERRA -->
        <section class="product-section flex items-center justify-center px-6" data-model="terra">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center gap-8 md:gap-16">
                <div class="w-full md:flex-1">
                    <div class="glass-panel rounded-[30px] md:rounded-[40px] p-6 md:p-10 flex items-center justify-center h-[350px] md:h-[600px] overflow-hidden touch-pan-y">
                        <img id="img-terra" src="IMG/TerraGraphite.1.png" class="case-img pointer-events-none">
                    </div>
                    <div class="nav-arrows flex justify-center space-x-6 mt-10">
                        <button onclick="nav('terra', -1)" class="nav-btn p-5 rounded-2xl w-16 h-16">←</button>
                        <button onclick="nav('terra', 1)" class="nav-btn p-5 rounded-2xl w-16 h-16">→</button>
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start gap-6 md:gap-12 w-full md:w-auto">
                    <div class="flex flex-row md:flex-col gap-6 order-2 md:order-2">
                        <div onclick="setColor('terra', 'graphite')" id="terra-graphite" class="color-circle active w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#1c1c1c] border border-white/10"></div>
                        <div onclick="setColor('terra', 'jade')" id="terra-jade" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#4d5d53] border border-white/10"></div>
                        <div onclick="setColor('terra', 'silver')" id="terra-silver" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#d1d5db] border border-white/10"></div>
                    </div>
                    <div class="text-center md:text-left order-1 md:order-1">
                        <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-2 md:mb-4">Terra</h2>
                        <p class="text-zinc-500 uppercase text-[10px] md:text-[11px] tracking-[0.4em] font-bold">Crafted for Gamers</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- КАРТОЧКА 3: RIDGE -->
        <section class="product-section flex items-center justify-center px-6" data-model="ridge">
            <div class="max-w-6xl w-full flex flex-col md:flex-row items-center gap-8 md:gap-16">
                <div class="w-full md:flex-1">
                    <div class="glass-panel rounded-[30px] md:rounded-[40px] p-6 md:p-10 flex items-center justify-center h-[350px] md:h-[600px] overflow-hidden touch-pan-y">
                        <img id="img-ridge" src="IMG/RidgeBlack.1.png" class="case-img pointer-events-none">
                    </div>
                    <div class="nav-arrows flex justify-center space-x-6 mt-10">
                        <button onclick="nav('ridge', -1)" class="nav-btn p-5 rounded-2xl w-16 h-16">←</button>
                        <button onclick="nav('ridge', 1)" class="nav-btn p-5 rounded-2xl w-16 h-16">→</button>
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start gap-6 md:gap-12 w-full md:w-auto">
                    <div class="flex flex-row md:flex-col gap-6 order-2 md:order-2">
                        <div onclick="setColor('ridge', 'black')" id="ridge-black" class="color-circle active w-10 h-10 md:w-12 md:h-12 rounded-full bg-black border border-white/10"></div>
                        <div onclick="setColor('ridge', 'white')" id="ridge-white" class="color-circle w-10 h-10 md:w-12 md:h-12 rounded-full bg-white border border-black/10"></div>
                    </div>
                    <div class="text-center md:text-left order-1 md:order-1">
                        <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-2 md:mb-4">Ridge</h2>
                        <p class="text-zinc-500 uppercase text-[10px] md:text-[11px] tracking-[0.4em] font-bold">Slim Console Format</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const config = {
            mood: {
                current: 'black', idx: 0,
                black: ['IMG/MoodBlack.1.png', 'IMG/MoodBlack.2.png', 'IMG/MoodBlack.3.png'],
                white: ['IMG/MoodLight.1.png', 'IMG/MoodLight.2.png', 'IMG/MoodLight.3.png']
            },
            terra: {
                current: 'graphite', idx: 0,
                graphite: ['IMG/TerraGraphite.1.png', 'IMG/TerraGraphite.2.png', 'IMG/TerraGraphite.3.png'],
                jade: ['IMG/TerraJade.1.png', 'IMG/TerraJade.2.png', 'IMG/TerraJade.3.png'],
                silver: ['IMG/TerraSilver.1.png', 'IMG/TerraSilver.2.png', 'IMG/TerraSilver.3.png']
            },
            ridge: {
                current: 'black', idx: 0,
                black: ['IMG/RidgeBlack.1.png', 'IMG/RidgeBlack.2.png'],
                white: ['IMG/RidgeWhite.1.png', 'IMG/RidgeWhite.2.png']
            }
        };

        function setColor(model, color) {
            config[model].current = color;
            config[model].idx = 0;
            document.querySelectorAll(`[id^="${model}-"]`).forEach(c => c.classList.remove('active'));
            document.getElementById(`${model}-${color}`).classList.add('active');
            update(model);
        }

        function nav(model, dir) {
            const m = config[model];
            const len = m[m.current].length;
            m.idx = (m.idx + dir + len) % len;
            update(model);
        }

        function update(model) {
            const m = config[model];
            const el = document.getElementById(`img-${model}`);
            el.style.opacity = '0';
            el.style.transform = 'scale(0.98)';
            setTimeout(() => {
                el.src = m[m.current][m.idx];
                el.style.opacity = '1';
                el.style.transform = 'scale(1)';
            }, 250);
        }

        // --- ЛОГИКА СВАЙПОВ ---
        let touchStartX = 0;
        let touchEndX = 0;

        document.querySelectorAll('.glass-panel').forEach(panel => {
            const model = panel.closest('section').dataset.model;

            panel.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            panel.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe(model);
            }, { passive: true });
        });

        function handleSwipe(model) {
            const swipeThreshold = 50;
            if (touchStartX - touchEndX > swipeThreshold) {
                nav(model, 1); // Свайп влево -> след. фото
            } else if (touchEndX - touchStartX > swipeThreshold) {
                nav(model, -1); // Свайп вправо -> пред. фото
            }
        }
    </script>
</body>
</html>
